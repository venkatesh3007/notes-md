name: Release APK

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development
      
      - name: Build web app
        run: npm run build
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug
      
      - name: Rename APK
        run: |
          mkdir -p ./release
          cp ./android/app/build/outputs/apk/debug/app-debug.apk ./release/notes-md.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./app/release/notes-md.apk
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Notes.md ${{ github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
